<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stratos Reports</title>
  <meta name="robots" content="noindex, nofollow" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b0f14;
      color: #e6edf3;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    p {
      color: #8b949e;
      font-size: 16px;
      margin-bottom: 30px;
    }

    a {
      display: inline-block;
      padding: 12px 20px;
      border: 1px solid #30363d;
      border-radius: 6px;
      text-decoration: none;
      color: #e6edf3;
      transition: all 0.2s ease;
    }

    a:hover {
      background: #161b22;
      border-color: #8b949e;
    }

    .subtle {
      margin-top: 40px;
      font-size: 12px;
      color: #6e7681;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Stratos Reports</h1>
    <p>Private strategic intelligence briefs</p>

    <a href="/pro-capital/">View Pro Capital Report</a>

    <div class="subtle">
      Access is restricted to intended recipients
    </div>
  </div>
</body>
</html>
